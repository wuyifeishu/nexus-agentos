# ── AgentOS CI/CD Pipeline ──────────────────────────────────────────────────
# Triggers: push to main, PR to main, weekly security scan

name: AgentOS CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 8 * * 1"  # Weekly Monday 08:00 UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v2
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: uv pip install --system ruff mypy
      - run: ruff check agentos/ --output-format=github
      - run: ruff format --check agentos/
      - run: mypy agentos/ --ignore-missing-imports

  test:
    name: Tests (${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v2
        with:
          python-version: ${{ matrix.python }}
      - run: uv pip install --system -e ".[dev,api,rag]"
      - run: python -m pytest tests/ -v --tb=short -o "addopts="
      - uses: actions/upload-artifact@v4
        if: matrix.python == '3.12'
        with:
          name: coverage-report
          path: htmlcov/

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v2
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: uv pip install --system pip-audit bandit
      - run: bandit -r agentos/ -c pyproject.toml -f json -o bandit-report.json
      - run: pip-audit || true

  build:
    name: Build & Verify
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v2
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: uv build
      - run: |
          uv pip install --system dist/*.whl
          python -c "import agentos; print(agentos.__version__)"
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t agentos:ci .
      - run: |
          docker run --rm -d --name agentos-smoke agentos:ci
          sleep 3
          docker logs agentos-smoke --tail 20
          docker stop agentos-smoke

  publish-testpypi:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: [lint, test, security]
    if: github.ref == 'refs/heads/develop'
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v2
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: uv build
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          password: ${{ secrets.TESTPYPI_TOKEN }}

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [lint, test, security, docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v2
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: uv build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}
